<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Jogo de Plataforma 16x16</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="sprites/capa.ICO">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #080810;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas {
            image-rendering: pixelated;
            background-color: #111;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* BARRA DE COMANDOS TOTALMENTE FORA DA CAIXA DO JOGO */
        #barraMovimentoMobile {
            display: none; 
            width: 100%;
            max-width: 384px;
            height: 85px;
            background-color: #000;
            position: relative;
            border-top: 2px solid #222;
        }
        .btn-movimento {
            position: absolute;
            width: 55px;
            height: 55px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #444;
            border-radius: 8px;
            top: 15px;
        }
        .btn-movimento:active {
            background-color: rgba(0, 255, 255, 0.2);
            border-color: #00ffff;
        }
        #btnEsquerda { left: 20px; }
        #btnDireita { left: 90px; }
        #btnPulo { right: 20px; border-color: #00cccc; }

        #nomeInput {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: 18px;
            border: 3px solid #00ffff;
            background-color: #111;
            color: #fff;
            font-family: monospace;
            text-align: center;
            outline: none;
            border-radius: 4px;
            z-index: 10;
        }
        #nomeInput::placeholder {
            color: #555;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <input type="text" id="nomeInput" placeholder="DIGITE SEU NOME" maxlength="12">
    <canvas id="gameCanvas"></canvas>
    
    <div id="barraMovimentoMobile">
        <div id="btnEsquerda" class="btn-movimento"></div>
        <div id="btnDireita" class="btn-movimento"></div>
        <div id="btnPulo" class="btn-movimento"></div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const nomeInput = document.getElementById("nomeInput");
const barraMovimentoMobile = document.getElementById("barraMovimentoMobile");

const GAME_WIDTH = 384;
const GAME_HEIGHT = 384;

let isMobile = false;
let gameState = "START_MENU"; 
let nomeJogador = "PLAYER";

function initCanvas() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 900);
    
    if (gameState === "START_MENU" || gameState === "RANKING") {
        barraMovimentoMobile.style.display = "none";
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        canvas.style.height = "100vh";
        canvas.style.width = "auto";
    } else if (isMobile && gameState === "PLAYING") {
        barraMovimentoMobile.style.display = "block";
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        canvas.style.height = "calc(100vh - 85px)";
        canvas.style.width = "auto";
    } else {
        barraMovimentoMobile.style.display = "none";
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        canvas.style.height = "100vh";
        canvas.style.width = "auto";
    }
}
window.addEventListener('resize', initCanvas);

// --- SISTEMA SEGURO DE SPRITES ---
const sprites = {};
function carregarSprite(nome, caminho) {
    sprites[nome] = new Image();
    sprites[nome].src = caminho;
    sprites[nome].loaded = false;
    sprites[nome].onload = () => { 
        sprites[nome].loaded = true; 
        if(nome === "esquerda") document.getElementById("btnEsquerda").style.backgroundImage = `url('${caminho}')`;
        if(nome === "direita") document.getElementById("btnDireita").style.backgroundImage = `url('${caminho}')`;
        if(nome === "pulo") document.getElementById("btnPulo").style.backgroundImage = `url('${caminho}')`;
    };
    sprites[nome].onerror = () => { console.log("Erro ao carregar: " + caminho); };
}

carregarSprite("inicio", "sprites/inicio.PNG");
carregarSprite("solo", "sprites/solo novo.png");
carregarSprite("chao", "sprites/chao novo.png");
carregarSprite("chaoAlt", "sprites/chao novo alt.png");
carregarSprite("espinho", "sprites/espinhos.png");
carregarSprite("personagem", "sprites/personagem.png"); 
carregarSprite("discoPartido", "sprites/disco partido.PNG");   
carregarSprite("discoCompleto", "sprites/disco completo.PNG"); 
carregarSprite("fundoClaro", "sprites/FUNDO CLARO.PNG");
carregarSprite("fundoEscuro", "sprites/FUNDO ESCURO.PNG");
carregarSprite("mato", "sprites/mato.png");
carregarSprite("matoAlt", "sprites/mato alte.png");
carregarSprite("esquerda", "sprites/esquerda.png");
carregarSprite("direita", "sprites/direita.png");
carregarSprite("pulo", "sprites/pulo.png");

const imgAndando = [];
for (let i = 2; i <= 7; i++) {
    const img = new Image();
    img.src = `sprites/andando_${i}.PNG`;
    img.loaded = false;
    img.onload = () => { img.loaded = true; };
    imgAndando.push(img);
}

// --- CONFIGURAÇÕES ---
let currentLevel = 0;
let gameTimer = 0;
let timerInterval = null;
let discosQuebradosColetados = 0;
let discoInteiroColetado = false;
let chaoModificado = false; 
const TILE_SIZE = 48; 

let animFrame = 0;
let ultimoTempoFrame = 0;
const INTERVALO_FRAME = 100; 
let olhandoParaEsquerda = false;

const externoControls = { esquerda: false, direita: false };

const player = {
    x: 0, y: 0, width: 24, height: 32,
    vx: 0, vy: 0, speed: 3.8, gravity: 0.4,
    jumpForce: -10.5, grounded: false
};

const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (gameState === "PLAYING" && (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW")) {
        executarPulo();
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function executarPulo() {
    if (player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
        chaoModificado = !chaoModificado; 
    }
}

document.getElementById("btnEsquerda").addEventListener("touchstart", (e) => { e.preventDefault(); externoControls.esquerda = true; });
document.getElementById("btnEsquerda").addEventListener("touchend", () => { externoControls.esquerda = false; });
document.getElementById("btnDireita").addEventListener("touchstart", (e) => { e.preventDefault(); externoControls.direita = true; });
document.getElementById("btnDireita").addEventListener("touchend", () => { externoControls.direita = false; });
document.getElementById("btnPulo").addEventListener("touchstart", (e) => { e.preventDefault(); executarPulo(); });

function startGame() {
    if (nomeInput.value.trim() !== "") nomeJogador = nomeInput.value.trim().toUpperCase();
    nomeInput.style.display = "none";
    gameState = "PLAYING";
    gameTimer = 0;
    currentLevel = 0;
    discosQuebradosColetados = 0;
    discoInteiroColetado = false;
    map = JSON.parse(JSON.stringify(levels[currentLevel]));
    
    if(!timerInterval) {
        timerInterval = setInterval(() => { if(gameState === "PLAYING") gameTimer++; }, 1000);
    }
    initCanvas();
    resetPlayer();
}

nomeInput.addEventListener("keydown", e => { if (e.key === "Enter" && gameState === "START_MENU") startGame(); });

window.addEventListener("click", e => {
    if (e.target === nomeInput) return;
    if (gameState === "START_MENU") startGame();
    else if (gameState === "RANKING") { gameState = "START_MENU"; nomeInput.style.display = "block"; initCanvas(); }
});
window.addEventListener("touchstart", e => {
    if (e.target === nomeInput || e.target.classList.contains('btn-movimento')) return;
    if (gameState === "START_MENU") startGame();
    else if (gameState === "RANKING") { gameState = "START_MENU"; nomeInput.style.display = "block"; initCanvas(); }
});

const levels = [
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2], 
        [2, 0, 0, 7, 7, 0, 0, 2], 
        [2, 0, 0, 0, 0, 0, 0, 2],
        [2, 6, 6, 0, 0, 6, 6, 2], 
        [2, 0, 0, 0, 5, 0, 0, 2], 
        [2, 4, 1, 1, 1, 1, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]  
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2],
        [2, 6, 6, 6, 0, 0, 0, 2],
        [2, 0, 0, 0, 0, 77,0, 2], 
        [2, 0, 0, 0, 7, 7, 7, 2], 
        [2, 0, 0, 0, 0, 0, 5, 2], 
        [2, 4, 1, 1, 1, 0, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 5, 0, 0, 0, 0, 4, 2],
        [2, 0, 0, 0, 0, 0, 77,2], 
        [2, 6, 6, 0, 7, 7, 7, 2], 
        [2, 0, 66,0, 0, 0, 0, 2], 
        [2, 6, 6, 6, 0, 0, 0, 2], 
        [2, 4, 1, 1, 1, 0, 4, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ],
    // FASE 4 NOVA
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 66,0, 77, 4, 2],
        [2, 7, 7, 0, 0, 0, 6, 2],
        [2, 0, 0, 0, 2, 0, 0, 2],
        [2, 0, 6, 6, 7, 7, 0, 2],
        [2, 0, 0, 0, 0, 0, 5, 2],
        [2, 4, 1, 1, 0, 0, 0, 2],
        [2, 2, 2, 2, 2, 2, 2, 2]
    ],
    // FASE 5 NOVA
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 5, 0, 0, 0, 0, 0, 2],
        [2, 2, 7, 0, 6, 0, 7, 2],
        [2, 4, 0, 0, 0, 0, 0, 2],
        [2, 66,6, 7, 0, 6, 77,2],
        [2, 0, 0, 0, 0, 0, 4, 2],
        [2, 4, 1, 1, 6, 7, 0, 2],
        [2, 2, 2, 2, 2, 2, 2, 2]
    ]
];

let map = JSON.parse(JSON.stringify(levels[currentLevel]));

function resetPlayer() {
    for (let r = 0; r < map.length; r++) {
        for (let c = 0; c < map[r].length; c++) {
            if (map[r][c] === 1) {
                player.x = c * TILE_SIZE + (TILE_SIZE / 2) - (player.width / 2);
                player.y = (r * TILE_SIZE) - player.height - 5;
                player.vx = 0; player.vy = 0;
                chaoModificado = false;
                return;
            }
        }
    }
}

function update() {
    if (gameState !== "PLAYING") return;
    let andando = false;

    if (keys["ArrowLeft"] || keys["KeyA"] || externoControls.esquerda) {
        player.vx = -player.speed; olhandoParaEsquerda = true; andando = true;
    } else if (keys["ArrowRight"] || keys["KeyD"] || externoControls.direita) {
        player.vx = player.speed; olhandoParaEsquerda = false; andando = true;
    } else { player.vx = 0; }

    if (andando && player.grounded) {
        let agora = performance.now();
        if (agora - ultimoTempoFrame > INTERVALO_FRAME) {
            animFrame = (animFrame + 1) % 6; 
            ultimoTempoFrame = agora;
        }
    } else { animFrame = -1; }

    player.vy += player.gravity;
    player.x += player.vx;
    checkCollision("x");
    player.y += player.vy;
    player.grounded = false;
    checkCollision("y");

    if (discoInteiroColetado) {
        if (currentLevel < levels.length - 1) {
            currentLevel++; discosQuebradosColetados = 0; discoInteiroColetado = false;
            map = JSON.parse(JSON.stringify(levels[currentLevel])); resetPlayer();
        } else {
            let ranking = JSON.parse(localStorage.getItem("gameRanking")) || [];
            ranking.push({ nome: nomeJogador, tempo: gameTimer });
            ranking.sort((a, b) => a.tempo - b.tempo);
            localStorage.setItem("gameRanking", JSON.stringify(ranking));
            gameState = "RANKING"; 
            initCanvas(); 
        }
    }
}

function checkCollision(dir) {
    const rows = map.length; const cols = map[0].length;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let tile = map[r][c];
            if ((tile === 6 || tile === 66) && chaoModificado) continue;  
            if ((tile === 7 || tile === 77) && !chaoModificado) continue; 

            if (tile === 2 || tile === 1 || tile === 6 || tile === 7) {
                let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;
                if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                    player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                    if (dir === "x") {
                        if (player.vx > 0) player.x = tx - player.width;
                        if (player.vx < 0) player.x = tx + TILE_SIZE;
                    }
                    if (dir === "y") {
                        if (player.vy > 0) { player.y = ty - player.height; player.vy = 0; player.grounded = true; }
                        if (player.vy < 0) { player.y = ty + TILE_SIZE; player.vy = 0; }
                    }
                }
            }
            let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;
            if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                if (tile === 66 || tile === 77) resetPlayer();
                else if (tile === 4) { discosQuebradosColetados++; map[r][c] = 0; }
                else if (tile === 5 && discosQuebradosColetados >= 3) { discoInteiroColetado = true; map[r][c] = 0; }
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

    if (gameState === "START_MENU") {
        if (sprites.inicio.loaded) ctx.drawImage(sprites.inicio, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        else {
            ctx.fillStyle = "#222"; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.fillStyle = "#0ff"; ctx.font = "20px monospace"; ctx.textAlign = "center";
            ctx.fillText("CLIQUE PARA JOGAR", GAME_WIDTH/2, GAME_HEIGHT/2 + 40);
        }
        return;
    }

    if (gameState === "RANKING") {
        ctx.fillStyle = "#080810"; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.textAlign = "center"; ctx.fillStyle = "#00ffff"; ctx.font = "bold 24px monospace";
        ctx.fillText("🏆 RANKING GERAL 🏆", GAME_WIDTH / 2, 60);
        let ranking = JSON.parse(localStorage.getItem("gameRanking")) || []; ctx.font = "bold 12px monospace";
        let yPos = 110;
        for (let i = 0; i < Math.min(ranking.length, 5); i++) {
            ctx.fillStyle = i === 0 ? "#ffff00" : "#ffffff";
            ctx.fillText(`${i + 1}º | ${ranking[i].nome} - ${ranking[i].tempo}s`, GAME_WIDTH / 2, yPos);
            yPos += 30;
        }
        ctx.fillStyle = "#888"; ctx.font = "10px monospace";
        ctx.fillText("Clique para reiniciar", GAME_WIDTH / 2, GAME_HEIGHT - 30);
        return;
    }

    if (gameState === "PLAYING") {
        if (chaoModificado && sprites.fundoEscuro.loaded) ctx.drawImage(sprites.fundoEscuro, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        else if (!chaoModificado && sprites.fundoClaro.loaded) ctx.drawImage(sprites.fundoClaro, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        else { ctx.fillStyle = chaoModificado ? "#050510" : "#151525"; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT); }

        for (let r = 0; r < map.length; r++) {
            for (let c = 0; c < map[r].length; c++) {
                let tile = map[r][c]; let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;

                if (tile === 2) {
                    if (chaoModificado && sprites.chaoAlt.loaded) ctx.drawImage(sprites.chaoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                    else if (!chaoModificado && sprites.chao.loaded) ctx.drawImage(sprites.chao, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#555"; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
                }
                else if (tile === 1) {
                    if (sprites.solo.loaded) ctx.drawImage(sprites.solo, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#844"; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
                } 
                else if (tile === 3) {
                    if (chaoModificado && sprites.matoAlt.loaded) ctx.drawImage(sprites.matoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                    else if (sprites.mato.loaded) ctx.drawImage(sprites.mato, tx, ty, TILE_SIZE, TILE_SIZE);
                }
                else if (tile === 6 && !chaoModificado) {
                    if (sprites.chao.loaded) ctx.drawImage(sprites.chao, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#00f"; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
                }
                else if (tile === 66 && !chaoModificado) {
                    if (sprites.espinho.loaded) ctx.drawImage(sprites.espinho, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#f00"; ctx.fillRect(tx, ty + 30, TILE_SIZE, 18); }
                }
                else if (tile === 7 && chaoModificado) {
                    if (sprites.chaoAlt.loaded) ctx.drawImage(sprites.chaoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#f0f"; ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE); }
                }
                else if (tile === 77 && chaoModificado) {
                    if (sprites.espinho.loaded) ctx.drawImage(sprites.espinho, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#f00"; ctx.fillRect(tx, ty + 30, TILE_SIZE, 18); }
                }
                else if (tile === 4) {
                    if (sprites.discoPartido.loaded) ctx.drawImage(sprites.discoPartido, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#ff0"; ctx.fillRect(tx + 16, ty + 16, 16, 16); }
                } 
                else if (tile === 5 && discosQuebradosColetados >= 3) {
                    if (sprites.discoCompleto.loaded) ctx.drawImage(sprites.discoCompleto, tx, ty, TILE_SIZE, TILE_SIZE);
                    else { ctx.fillStyle = "#0ff"; ctx.fillRect(tx + 12, ty + 12, 24, 24); }
                }
            }
        }

        ctx.save(); let posX = player.x;
        if (olhandoParaEsquerda) { ctx.scale(-1, 1); posX = -player.x - player.width; }
        
        if (animFrame >= 0 && imgAndando[animFrame] && imgAndando[animFrame].loaded) {
            ctx.drawImage(imgAndando[animFrame], posX, player.y, player.width, player.height);
        } else if (sprites.personagem.loaded) {
            ctx.drawImage(sprites.personagem, posX, player.y, player.width, player.height);
        } else { 
            ctx.fillStyle = "#0f0"; ctx.fillRect(posX, player.y, player.width, player.height); 
        }
        ctx.restore();

        ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(0, 0, GAME_WIDTH, 24);
        ctx.fillStyle = "#fff"; ctx.font = "10px monospace"; ctx.textAlign = "left";
        ctx.fillText(`${nomeJogador}`, 10, 16);
        ctx.fillText(`DISCOS: ${discosQuebradosColetados}/3`, 130, 16);
        // Cabeçalho atualizado indicando o total de 5 fases
        ctx.fillText(`F: ${currentLevel + 1}/5 T: ${gameTimer}s`, GAME_WIDTH - 120, 16);
    }
}

initCanvas();

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
