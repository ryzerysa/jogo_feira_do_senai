<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Jogo de Plataforma 16x16</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="sprites/capa.ICO">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #080810;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        
        /* Container Principal */
        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* O Canvas do jogo */
        canvas {
            image-rendering: pixelated;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: block;
        }

        /* Área dos botões totalmente FORA do canvas do jogo */
        #mobileControlsArea {
            display: none; /* Ativado via JS apenas no mobile */
            width: 100%;
            max-width: 450px;
            height: 110px;
            background-color: #000;
            position: relative;
            border-top: 2px solid #222;
        }

        .btn-mobile {
            position: absolute;
            width: 55px;
            height: 55px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #444;
            border-radius: 10px;
            top: 25px;
        }
        .btn-mobile:active {
            background-color: rgba(0, 255, 255, 0.3);
            border-color: #00ffff;
        }
        #btnEsquerda { left: 20px; }
        #btnDireita { left: 95px; }
        #btnPulo { right: 20px; border-color: #00cccc; }

        /* Input de Nome */
        #nomeInput {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: 18px;
            border: 3px solid #00ffff;
            background-color: #111;
            color: #fff;
            font-family: monospace;
            text-align: center;
            outline: none;
            border-radius: 4px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <input type="text" id="nomeInput" placeholder="DIGITE SEU NOME" maxlength="12">
    <canvas id="gameCanvas"></canvas>
    
    <div id="mobileControlsArea">
        <div id="btnEsquerda" class="btn-mobile"></div>
        <div id="btnDireita" class="btn-mobile"></div>
        <div id="btnPulo" class="btn-mobile"></div>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const nomeInput = document.getElementById("nomeInput");
const mobileControlsArea = document.getElementById("mobileControlsArea");

const GAME_WIDTH = 384;
const GAME_HEIGHT = 384;

let isMobile = false;
let gameState = "START_MENU"; 
let nomeJogador = "PLAYER";

function initCanvas() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 900);
    
    if (gameState === "START_MENU") {
        // TELA INICIAL: Ocupa o celular inteiro
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.style.width = "100vw";
        canvas.style.height = "100vh";
        mobileControlsArea.style.display = "none";
    } else {
        // DURANTE O JOGO: Canvas quadrado perfeito, botões embaixo se for mobile
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        if (isMobile) {
            mobileControlsArea.style.display = "block";
            let disponivelH = window.innerHeight - 110;
            let tamanho = Math.min(window.innerWidth, disponivelH);
            canvas.style.width = tamanho + "px";
            canvas.style.height = tamanho + "px";
        } else {
            mobileControlsArea.style.display = "none";
            let tamanho = Math.min(window.innerWidth, window.innerHeight);
            canvas.style.width = tamanho + "px";
            canvas.style.height = tamanho + "px";
        }
    }
}
window.addEventListener('resize', initCanvas);

// --- SISTEMA SEGURO DE SPRITES ---
const sprites = {};
function carregarSprite(nome, caminho) {
    sprites[nome] = new Image();
    sprites[nome].src = caminho;
    sprites[nome].loaded = false;
    sprites[nome].onload = () => { 
        sprites[nome].loaded = true; 
        // Aplica os sprites nos botões HTML externos se existirem
        if(nome === "esquerda") document.getElementById("btnEsquerda").style.backgroundImage = `url('${caminho}')`;
        if(nome === "direita") document.getElementById("btnDireita").style.backgroundImage = `url('${caminho}')`;
        if(nome === "pulo") document.getElementById("btnPulo").style.backgroundImage = `url('${caminho}')`;
    };
}

carregarSprite("inicio", "sprites/inicio.PNG");
carregarSprite("solo", "sprites/solo novo.png");
carregarSprite("chao", "sprites/chao novo.png");
carregarSprite("chaoAlt", "sprites/chao novo alt.png");
carregarSprite("espinho", "sprites/espinhos.png");
carregarSprite("personagem", "sprites/personagem.png"); 
carregarSprite("discoPartido", "sprites/disco partido.png");   // Nome corrigido
carregarSprite("discoCompleto", "sprites/disco completo.png"); // Nome corrigido
carregarSprite("fundoClaro", "sprites/FUNDO CLARO.PNG");
carregarSprite("fundoEscuro", "sprites/FUNDO ESCURO.PNG");
carregarSprite("mato", "sprites/mato.png");
carregarSprite("matoAlt", "sprites/mato alte.png");
carregarSprite("esquerda", "sprites/esquerda.png");
carregarSprite("direita", "sprites/direita.png");
carregarSprite("pulo", "sprites/pulo.png");

const imgAndando = [];
for (let i = 1; i <= 7; i++) {
    const img = new Image();
    img.src = `sprites/andando_${i}.png`;
    imgAndando.push(img);
}

// --- CONFIGURAÇÕES DO JOGO ---
let currentLevel = 0;
let gameTimer = 0;
let timerInterval = null;
let discosQuebradosColetados = 0;
let discoInteiroColetado = false;
let chaoModificado = false; 
const TILE_SIZE = 48; 

let animFrame = 0;
let ultimoTempoFrame = 0;
const INTERVALO_FRAME = 100; 
let olhandoParaEsquerda = false;

// Estado dos botões externos
const mobileControls = { esquerda: false, direita: false };

const player = {
    x: 0, y: 0, width: 24, height: 32,
    vx: 0, vy: 0, speed: 3.8, gravity: 0.4,
    jumpForce: -10.5, grounded: false
};

// Controles do Teclado (PC)
const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (gameState === "PLAYING" && (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW")) {
        executarPulo();
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function executarPulo() {
    if (player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
        chaoModificado = !chaoModificado; 
    }
}

// Eventos de Toque dos Novos Botões Externos (HTML)
document.getElementById("btnEsquerda").addEventListener("touchstart", (e) => { e.preventDefault(); mobileControls.esquerda = true; });
document.getElementById("btnEsquerda").addEventListener("touchend", () => { mobileControls.esquerda = false; });
document.getElementById("btnDireita").addEventListener("touchstart", (e) => { e.preventDefault(); mobileControls.direita = true; });
document.getElementById("btnDireita").addEventListener("touchend", () => { mobileControls.direita = false; });
document.getElementById("btnPulo").addEventListener("touchstart", (e) => { e.preventDefault(); executarPulo(); });

function startGame() {
    if (nomeInput.value.trim() !== "") nomeJogador = nomeInput.value.trim().toUpperCase();
    nomeInput.style.display = "none";
    gameState = "PLAYING";
    gameTimer = 0;
    currentLevel = 0;
    discosQuebradosColetados = 0;
    discoInteiroColetado = false;
    map = JSON.parse(JSON.stringify(levels[currentLevel]));
    
    if(!timerInterval) {
        timerInterval = setInterval(() => { if(gameState === "PLAYING") gameTimer++; }, 1000);
    }
    initCanvas();
    resetPlayer();
}

nomeInput.addEventListener("keydown", e => { if (e.key === "Enter" && gameState === "START_MENU") startGame(); });
canvas.addEventListener("click", e => {
    if (gameState === "START_MENU") startGame();
    else if (gameState === "RANKING") { gameState = "START_MENU"; nomeInput.style.display = "block"; initCanvas(); }
});

const levels = [
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2], 
        [2, 0, 0, 7, 7, 0, 0, 2], 
        [2, 0, 0, 0, 0, 0, 0, 2],
        [2, 6, 6, 0, 0, 6, 6, 2], 
        [2, 0, 0, 0, 5, 0, 0, 2], 
        [2, 4, 1, 1, 1, 1, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]  
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2],
        [2, 6, 6, 6, 0, 0, 0, 2],
        [2, 0, 0, 0, 0, 77,0, 2], 
        [2, 0, 0, 0, 7, 7, 7, 2], 
        [2, 0, 0, 0, 0, 0, 5, 2], 
        [2, 4, 1, 1, 1, 0, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 5, 0, 0, 0, 0, 4, 2],
        [2, 0, 0, 0, 0, 0, 77,2], 
        [2, 6, 6, 0, 7, 7, 7, 2], 
        [2, 0, 66,0, 0, 0, 0, 2], 
        [2, 6, 6, 6, 0, 0, 0, 2], 
        [2, 4, 1, 1, 1, 0, 4, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ]
];

let map = JSON.parse(JSON.stringify(levels[currentLevel]));

function resetPlayer() {
    for (let r = 0; r < map.length; r++) {
        for (let c = 0; c < map[r].length; c++) {
            if (map[r][c] === 1) {
                player.x = c * TILE_SIZE + (TILE_SIZE / 2) - (player.width / 2);
                player.y = (r * TILE_SIZE) - player.height - 5;
                player.vx = 0; player.vy = 0;
                chaoModificado = false;
                return;
            }
        }
    }
}

function update() {
    if (gameState !== "PLAYING") return;
    let andando = false;

    if (keys["ArrowLeft"] || keys["KeyA"] || mobileControls.esquerda) {
        player.vx = -player.speed; olhandoParaEsquerda = true; andando = true;
    } else if (keys["ArrowRight"] || keys["KeyD"] || mobileControls.direita) {
        player.vx = player.speed; olhandoParaEsquerda = false; andando = true;
    } else { player.vx = 0; }

    if (andando && player.grounded) {
        let agora = performance.now();
        if (agora - ultimoTempoFrame > INTERVALO_FRAME) {
            animFrame = (animFrame + 1) % 7; ultimoTempoFrame = agora;
        }
    } else { animFrame = -1; }

    player.vy += player.gravity;
    player.x += player.vx;
    checkCollision("x");
    player.y += player.vy;
    player.grounded = false;
    checkCollision("y");

    if (discoInteiroColetado) {
        if (currentLevel < levels.length - 1) {
            currentLevel++; discosQuebradosColetados = 0; discoInteiroColetado = false;
            map = JSON.parse(JSON.stringify(levels[currentLevel])); resetPlayer();
        } else { 
            let ranking = JSON.parse(localStorage.getItem("gameRanking")) || [];
            ranking.push({ nome: nomeJogador, tempo: gameTimer });
            ranking.sort((a, b) => a.tempo - b.tempo);
            localStorage.setItem("gameRanking", JSON.stringify(ranking));
            gameState = "RANKING"; 
            initCanvas(); 
        }
    }
}

function checkCollision(dir) {
    const rows = map.length; const cols = map[0].length;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let tile = map[r][c];
            if ((tile === 6 || tile === 66) && chaoModificado) continue;  
            if ((tile === 7 || tile === 77) && !chaoModificado) continue; 

            if (tile === 2 || tile === 1 || tile === 6 || tile === 7) {
                let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;
                if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                    player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                    if (dir === "x") {
                        if (player.vx > 0) player.x = tx - player.width;
                        if (player.vx < 0) player.x = tx + TILE_SIZE;
                    }
                    if (dir === "y") {
                        if (player.vy > 0) { player.y = ty - player.height; player.vy = 0; player.grounded = true; }
                        if (player.vy < 0) { player.y = ty + TILE_SIZE; player.vy = 0; }
                    }
                }
            }
            let tx = c * TILE_SIZE; let ty = r * TILE_SIZE;
            if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                if (tile === 66 || tile === 77) resetPlayer();
                else if (tile === 4) { discosQuebradosColetados++; map[r][c] = 0; }
                else if (tile === 5 && discosQuebradosColetados >= 3) { discoInteiroColetado = true; map[r][c] = 0; }
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === "START_MENU") {
        if (sprites.inicio.loaded) {
            ctx.drawImage(sprites.inicio, 0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#222"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0ff"; ctx.font = "24px monospace"; ctx.textAlign = "center";
            ctx.fillText("CLIQUE PARA JOGAR", canvas.width/2, canvas.height/2 + 80);
        }
        return;
    }

    if (gameState === "RANKING") {
        ctx.fillStyle = "#080810"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = "center"; ctx.fillStyle = "#00ffff"; ctx.font = "bold 24px monospace";
        ctx.fillText("🏆 RANKING GERAL 🏆", canvas.width / 2, 60);
        let ranking = JSON.parse(localStorage.getItem("gameRanking")) || [];
        ctx.font = "bold 14px monospace"; let yPos = 120;
        for (let i = 0; i < Math.min(ranking.length, 5); i++) {
            ctx.fillStyle = i === 0 ? "#ffff00" : "#ffffff";
            ctx.fillText(`${i + 1}º | ${ranking[i].nome} - ${ranking[i].tempo}s`, canvas.width / 2, yPos);
            yPos += 35;
        }
        ctx.fillStyle = "#888"; ctx.font = "12px monospace";
        ctx.fillText("Clique para reiniciar", canvas.width / 2, canvas.height - 40);
        return;
    }

    if (gameState === "PLAYING") {
        if (chaoModificado && sprites.fundoEscuro.loaded) ctx.drawImage(sprites.fundoEscuro, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        else if (!chaoModificado && sprites.f
