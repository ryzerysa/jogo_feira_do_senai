<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Jogo de Plataforma 16x16</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="sprites/capa.ICO">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #080810;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        #gameContainer {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        canvas {
            image-rendering: pixelated;
            background-color: #111;
            /* Força o canvas a se ajustar mantendo a proporção de quadrado na tela horizontal */
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: 100vh;
            aspect-ratio: 1 / 1;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #nomeInput {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 20px;
            font-size: 18px;
            border: 3px solid #00ffff;
            background-color: #111;
            color: #fff;
            font-family: monospace;
            text-align: center;
            outline: none;
            border-radius: 4px;
            z-index: 10;
        }
        #nomeInput::placeholder {
            color: #555;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <input type="text" id="nomeInput" placeholder="DIGITE SEU NOME" maxlength="12">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const nomeInput = document.getElementById("nomeInput");

const GAME_WIDTH = 384;
const GAME_HEIGHT = 384;

let isMobile = false;

// CORREÇÃO: O tamanho interno do canvas do jogo precisa ser sempre o tamanho lógico do jogo
function initCanvas() {
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    // Detecção mais robusta para habilitar os controles mobile
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 900);
}
window.addEventListener('resize', initCanvas);
initCanvas();

// --- ESTADO DO JOGO ---
let gameState = "START_MENU"; 
let nomeJogador = "PLAYER";

// --- CARREGAMENTO DOS SPRITES ---
const imgInicio = new Image();
const imgSolo = new Image();
const imgChao = new Image();
const imgChaoAlt = new Image();
const imgEspinho = new Image();
const imgPersonagemParado = new Image(); 
const imgDiscoPartido = new Image();
const imgDiscoCompleto = new Image();
const imgFundoClaro = new Image();
const imgFundoEscuro = new Image();
const imgMato = new Image();
const imgMatoAlt = new Image();

// Botões Mobile
const imgBtnEsquerda = new Image();
const imgBtnDireita = new Image();
const imgBtnPulo = new Image();

// Array de Sprites de Caminhada
const imgAndando = [];
for (let i = 1; i <= 7; i++) {
    const img = new Image();
    img.src = `sprites/andando_${i}.png`;
    imgAndando.push(img);
}

imgInicio.src = "sprites/inicio.PNG";
imgSolo.src = "sprites/solo novo.png";
imgChao.src = "sprites/chao novo.png";
imgChaoAlt.src = "sprites/chao novo alt.png";
imgEspinho.src = "sprites/espinhos.png";
imgPersonagemParado.src = "sprites/personagem.png"; 
imgDiscoPartido.src = "sprites/disco partido.png";
imgDiscoCompleto.src = "sprites/disco completo.png";
imgFundoClaro.src = "sprites/FUNDO CLARO.PNG";
imgFundoEscuro.src = "sprites/FUNDO ESCURO.PNG";
imgMato.src = "sprites/mato.png";
imgMatoAlt.src = "sprites/mato alte.png";

imgBtnEsquerda.src = "sprites/esquerda.png";
imgBtnDireita.src = "sprites/direita.png";
imgBtnPulo.src = "sprites/pulo.png";

// --- CONFIGURAÇÕES ---
let currentLevel = 0;
let gameTimer = 0;
let timerInterval = null;

let discosQuebradosColetados = 0;
let discoInteiroColetado = false;
let chaoModificado = false; 

const TILE_SIZE = 48; 

// --- CONTROLE DE ANIMAÇÃO ---
let animFrame = 0;
let ultimoTempoFrame = 0;
const INTERVALO_FRAME = 100; 
let olhandoParaEsquerda = false;

// --- CONFIGURAÇÃO DOS BOTÕES MOBILE (Posicionados proporcionalmente dentro da tela interna de 384x384) ---
const mobileControls = {
    esquerda: { x: 15, y: GAME_HEIGHT - 65, w: 45, h: 45, pressed: false },
    direita: { x: 75, y: GAME_HEIGHT - 65, w: 45, h: 45, pressed: false },
    pulo: { x: GAME_WIDTH - 65, y: GAME_HEIGHT - 65, w: 45, h: 45, pressed: false }
};

// --- JOGADOR ---
const player = {
    x: 0,
    y: 0,
    width: 24,  
    height: 32,
    vx: 0,
    vy: 0,
    speed: 3.8,
    gravity: 0.4,
    jumpForce: -10.5, 
    grounded: false
};

// --- CONTROLES TECLADO ---
const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (gameState === "PLAYING" && (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW")) {
        executarPulo();
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function executarPulo() {
    if (player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
        chaoModificado = !chaoModificado; 
    }
}

// --- SISTEMA DE TOQUE EM TELA HORIZONTAL ---
function handleTouch(e) {
    if (gameState !== "PLAYING") return;
    
    mobileControls.esquerda.pressed = false;
    mobileControls.direita.pressed = false;
    
    const rect = canvas.getBoundingClientRect();
    
    for (let i = 0; i < e.touches.length; i++) {
        const touch = e.touches[i];
        
        // CORREÇÃO: Mapeia as coordenadas de toque do tamanho real do navegador de volta para a proporção 384x384 do jogo
        const touchX = ((touch.clientX - rect.left) / rect.width) * GAME_WIDTH;
        const touchY = ((touch.clientY - rect.top) / rect.height) * GAME_HEIGHT;
        
        if (checkTouchCollision(touchX, touchY, mobileControls.esquerda)) {
            mobileControls.esquerda.pressed = true;
        }
        if (checkTouchCollision(touchX, touchY, mobileControls.direita)) {
            mobileControls.direita.pressed = true;
        }
        if (checkTouchCollision(touchX, touchY, mobileControls.pulo)) {
            if (!mobileControls.pulo.pressed) {
                executarPulo();
            }
            mobileControls.pulo.pressed = true;
        }
    }
}

function checkTouchCollision(tx, ty, btn) {
    return tx >= btn.x && tx <= btn.x + btn.w && ty >= btn.y && ty <= btn.y + btn.h;
}

window.addEventListener("touchstart", (e) => {
    if (gameState === "PLAYING") {
        handleTouch(e);
    }
}, { passive: false });

window.addEventListener("touchmove", (e) => {
    if (gameState === "PLAYING") {
        handleTouch(e);
    }
}, { passive: false });

window.addEventListener("touchend", (e) => {
    if (gameState === "PLAYING") {
        if (e.touches.length === 0) {
            mobileControls.esquerda.pressed = false;
            mobileControls.direita.pressed = false;
            mobileControls.pulo.pressed = false;
        } else {
            handleTouch(e);
        }
    }
}, { passive: false });

// --- SISTEMA DE RANKING E INÍCIO ---
function salvarRanking(nome, tempo) {
    let ranking = JSON.parse(localStorage.getItem("gameRanking")) || [];
    ranking.push({ nome: nome, tempo: tempo });
    ranking.sort((a, b) => a.tempo - b.tempo);
    localStorage.setItem("gameRanking", JSON.stringify(ranking));
}

function obterRanking() {
    return JSON.parse(localStorage.getItem("gameRanking")) || [];
}

function startGame() {
    if (nomeInput.value.trim() !== "") {
        nomeJogador = nomeInput.value.trim().toUpperCase();
    }
    
    nomeInput.style.display = "none";
    
    gameState = "PLAYING";
    gameTimer = 0;
    currentLevel = 0;
    discosQuebradosColetados = 0;
    discoInteiroColetado = false;
    map = JSON.parse(JSON.stringify(levels[currentLevel]));
    
    if(!timerInterval) {
        timerInterval = setInterval(() => {
            if(gameState === "PLAYING") gameTimer++;
        }, 1000);
    }
    resetPlayer();
}

nomeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && gameState === "START_MENU") {
        startGame();
    }
});

window.addEventListener("click", (e) => {
    if (e.target === nomeInput || ('ontouchstart' in window && e.type === "click" && gameState === "PLAYING")) return;

    if (gameState === "START_MENU") {
        startGame();
    } 
    else if (gameState === "RANKING") {
        gameState = "START_MENU";
        nomeInput.style.display = "block";
        initCanvas();
    }
});

// --- MAPAS ---
const levels = [
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2], 
        [2, 0, 0, 7, 7, 0, 0, 2], 
        [2, 0, 0, 0, 0, 0, 0, 2],
        [2, 6, 6, 0, 0, 6, 6, 2], 
        [2, 0, 0, 0, 5, 0, 0, 2], 
        [2, 4, 1, 1, 1, 1, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]  
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 4, 0, 0, 0, 0, 4, 2],
        [2, 6, 6, 6, 0, 0, 0, 2],
        [2, 0, 0, 0, 0, 77,0, 2], 
        [2, 0, 0, 0, 7, 7, 7, 2], 
        [2, 0, 0, 0, 0, 0, 5, 2], 
        [2, 4, 1, 1, 1, 0, 0, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ],
    [
        [2, 2, 2, 2, 2, 2, 2, 2],
        [2, 5, 0, 0, 0, 0, 4, 2],
        [2, 0, 0, 0, 0, 0, 77,2], 
        [2, 6, 6, 0, 7, 7, 7, 2], 
        [2, 0, 66,0, 0, 0, 0, 2], 
        [2, 6, 6, 6, 0, 0, 0, 2], 
        [2, 4, 1, 1, 1, 0, 4, 2], 
        [2, 2, 2, 2, 2, 2, 2, 2]
    ]
];

let map = JSON.parse(JSON.stringify(levels[currentLevel]));

function resetPlayer() {
    for (let r = 0; r < map.length; r++) {
        for (let c = 0; c < map[r].length; c++) {
            if (map[r][c] === 1) {
                player.x = c * TILE_SIZE + (TILE_SIZE / 2) - (player.width / 2);
                player.y = (r * TILE_SIZE) - player.height - 5;
                player.vx = 0;
                player.vy = 0;
                chaoModificado = false;
                return;
            }
        }
    }
}

function update() {
    if (gameState !== "PLAYING") return;

    let andando = false;

    if (keys["ArrowLeft"] || keys["KeyA"] || mobileControls.esquerda.pressed) {
        player.vx = -player.speed;
        olhandoParaEsquerda = true;
        andando = true;
    }
    else if (keys["ArrowRight"] || keys["KeyD"] || mobileControls.direita.pressed) {
        player.vx = player.speed;
        olhandoParaEsquerda = false;
        andando = true;
    }
    else {
        player.vx = 0;
    }

    if (andando && player.grounded) {
        let agora = performance.now();
        if (agora - ultimoTempoFrame > INTERVALO_FRAME) {
            animFrame = (animFrame + 1) % 7; 
            ultimoTempoFrame = agora;
        }
    } else {
        animFrame = -1; 
    }

    player.vy += player.gravity;
    player.x += player.vx;
    checkCollision("x");

    player.y += player.vy;
    player.grounded = false;
    checkCollision("y");

    if (discoInteiroColetado) {
        if (currentLevel < levels.length - 1) {
            currentLevel++;
            discosQuebradosColetados = 0;
            discoInteiroColetado = false;
            map = JSON.parse(JSON.stringify(levels[currentLevel]));
            resetPlayer();
        } else {
            salvarRanking(nomeJogador, gameTimer);
            gameState = "RANKING";
            initCanvas();
        }
    }
}

function checkCollision(dir) {
    const rows = map.length;
    const cols = map[0].length;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let tile = map[r][c];

            if ((tile === 6 || tile === 66) && chaoModificado) continue;  
            if ((tile === 7 || tile === 77) && !chaoModificado) continue; 

            if (tile === 2 || tile === 1 || tile === 6 || tile === 7) {
                let tx = c * TILE_SIZE;
                let ty = r * TILE_SIZE;

                if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                    player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                    
                    if (dir === "x") {
                        if (player.vx > 0) player.x = tx - player.width;
                        if (player.vx < 0) player.x = tx + TILE_SIZE;
                    }
                    if (dir === "y") {
                        if (player.vy > 0) {
                            player.y = ty - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        }
                        if (player.vy < 0) {
                            player.y = ty + TILE_SIZE;
                            player.vy = 0;
                        }
                    }
                }
            }

            let tx = c * TILE_SIZE;
            let ty = r * TILE_SIZE;
            if (player.x < tx + TILE_SIZE && player.x + player.width > tx &&
                player.y < ty + TILE_SIZE && player.y + player.height > ty) {
                
                if (tile === 66 || tile === 77) {
                    resetPlayer();
                }
                else if (tile === 4) {
                    discosQuebradosColetados++;
                    map[r][c] = 0;
                }
                else if (tile === 5 && discosQuebradosColetados >= 3) {
                    discoInteiroColetado = true;
                    map[r][c] = 0;
                }
            }
        }
    }
}

function draw() {
    // CORREÇÃO: Todas as telas agora desenham de forma fixa em cima da proporção GAME_WIDTH x GAME_HEIGHT
    if (gameState === "START_MENU") {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.drawImage(imgInicio, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        return;
    }

    if (gameState === "RANKING") {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.drawImage(imgInicio, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        ctx.fillStyle = "rgba(8, 8, 16, 0.82)";
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        
        ctx.textAlign = "center";
        ctx.fillStyle = "#00ffff";
        ctx.font = "bold 24px monospace";
        ctx.fillText("🏆 RANKING GERAL 🏆", GAME_WIDTH / 2, 60);
        
        let ranking = obterRanking();
        ctx.font = "bold 12px monospace";
        
        let yPos = 110;
        for (let i = 0; i < Math.min(ranking.length, 5); i++) {
            let cor = i === 0 ? "#ffff00" : (i === 1 ? "#cccccc" : (i === 2 ? "#cd7f32" : "#ffffff"));
            ctx.fillStyle = cor;
            ctx.fillText(`${i + 1}º MATRIZ | ${ranking[i].nome} - ${ranking[i].tempo}s`, GAME_WIDTH / 2, yPos);
            yPos += 30;
        }

        ctx.fillStyle = "#888";
        ctx.font = "10px monospace";
        ctx.fillText(isMobile ? "Toque na tela para reiniciar" : "Clique em qualquer lugar para reiniciar", GAME_WIDTH / 2, GAME_HEIGHT - 30);
        ctx.textAlign = "left"; 
        return;
    }

    if (gameState === "PLAYING") {
        ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        if (chaoModificado) {
            ctx.drawImage(imgFundoEscuro, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        } else {
            ctx.drawImage(imgFundoClaro, 0, 0, GAME_WIDTH, GAME_HEIGHT);
        }

        for (let r = 0; r < map.length; r++) {
            for (let c = 0; c < map[r].length; c++) {
                let tile = map[r][c];
                let tx = c * TILE_SIZE;
                let ty = r * TILE_SIZE;

                if (tile === 2) {
                    if (chaoModificado) {
                        ctx.drawImage(imgChaoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                    } else {
                        ctx.drawImage(imgChao, tx, ty, TILE_SIZE, TILE_SIZE);
                    }
                }
                else if (tile === 1) {
                    ctx.drawImage(imgSolo, tx, ty, TILE_SIZE, TILE_SIZE);
                } 
                else if (tile === 3) {
                    if (chaoModificado) {
                        ctx.drawImage(imgMatoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                    } else {
                        ctx.drawImage(imgMato, tx, ty, TILE_SIZE, TILE_SIZE);
                    }
                }
                else if (tile === 6 && !chaoModificado) {
                    ctx.drawImage(imgChao, tx, ty, TILE_SIZE, TILE_SIZE);
                }
                else if (tile === 66 && !chaoModificado) {
                    ctx.drawImage(imgEspinho, tx, ty, TILE_SIZE, TILE_SIZE);
                }
                else if (tile === 7 && chaoModificado) {
                    ctx.drawImage(imgChaoAlt, tx, ty, TILE_SIZE, TILE_SIZE);
                }
                else if (tile === 77 && chaoModificado) {
                    ctx.drawImage(imgEspinho, tx, ty, TILE_SIZE, TILE_SIZE);
                }
                else if (tile === 4) {
                    ctx.drawImage(imgDiscoPartido, tx, ty, TILE_SIZE, TILE_SIZE);
                } 
                else if (tile === 5) {
                    if (discosQuebradosColetados >= 3) {
                        ctx.drawImage(imgDiscoCompleto, tx, ty, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // --- DESENHO DO PERSONAGEM ---
        ctx.save();
        let posX = player.x;
        if (olhandoParaEsquerda) {
            ctx.scale(-1, 1);
            posX = -player.x - player.width;
        }

        if (animFrame >= 0) {
            ctx.drawImage(imgAndando[animFrame], posX, player.y, player.width, player.height);
        } else {
            ctx.drawImage(imgPersonagemParado, posX, player.y, player.width, player.height);
        }
        ctx.restore();

        // --- BOTÕES MOBILE ---
        if (isMobile) {
            ctx.globalAlpha = mobileControls.esquerda.pressed ? 0.9 : 0.55;
            ctx.drawImage(imgBtnEsquerda, mobileControls.esquerda.x, mobileControls.esquerda.y, mobileControls.esquerda.w, mobileControls.esquerda.h);
            
            ctx.globalAlpha = mobileControls.direita.pressed ? 0.9 : 0.55;
            ctx.drawImage(imgBtnDireita, mobileControls.direita.x, mobileControls.direita.y, mobileControls.direita.w, mobileControls.direita.h);
            
            ctx.globalAlpha = mobileControls.pulo.pressed ? 0.9 : 0.55;
            ctx.drawImage(imgBtnPulo, mobileControls.pulo.x, mobileControls.pulo.y, mobileControls.pulo.w, mobileControls.pulo.h);
            
            ctx.globalAlpha = 1.0; 
        }

        // Interface HUD
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, GAME_WIDTH, 24);
        ctx.fillStyle = "#fff";
        ctx.font = "10px monospace";
        ctx.fillText(`${nomeJogador}`, 10, 16);
        ctx.fillText(`DISCOS: ${discosQuebradosColetados}/3`, 130, 16);
        ctx.fillText(`F: ${currentLevel + 1}/3  T: ${gameTimer}s`, GAME_WIDTH - 145, 16);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
